version: '3.8'

services:
  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - dharma-network

  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=dharmasikhara
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - MONGODB_URI=mongodb://mongodb:27017/dharmasikhara
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - JWT_SECRET=your_jwt_secret_here
    volumes:
      - ./backend:/app
      - /C/Users/ASUS/.cache/huggingface:/root/.cache/huggingface
    depends_on:
      - postgres
      - mongodb
      - redis
      - elasticsearch
    networks:
      - dharma-network

  # PostgreSQL database
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_DB=dharmasikhara
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dharma-network

  # MongoDB database
  mongodb:
    image: mongo:5
    volumes:
      - mongodb_data:/data/db
    networks:
      - dharma-network

  # Redis cache
  redis:
    image: redis:7
    networks:
      - dharma-network

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - dharma-network

volumes:
  postgres_data:
  mongodb_data:
  elasticsearch_data:

networks:
  dharma-network:
    driver: bridge